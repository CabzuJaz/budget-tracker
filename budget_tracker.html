<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Budget Tracker</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Syne:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0a0f;
    --surface: #13131a;
    --surface2: #1c1c26;
    --border: #2a2a3a;
    --accent: #7c6af7;
    --accent2: #4ade80;
    --danger: #f87171;
    --warn: #fbbf24;
    --text: #e8e8f0;
    --muted: #6b6b8a;
    --cash: #4ade80;
    --ralph: #7c6af7;
    --jazz: #f472b6;
    --spay: #fbbf24;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Syne', sans-serif;
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* Grid background */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image: linear-gradient(rgba(124,106,247,0.03) 1px, transparent 1px),
                      linear-gradient(90deg, rgba(124,106,247,0.03) 1px, transparent 1px);
    background-size: 40px 40px;
    pointer-events: none;
    z-index: 0;
  }

  .container { max-width: 1200px; margin: 0 auto; padding: 2rem; position: relative; z-index: 1; }

  /* Header */
  header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 2.5rem;
    padding-bottom: 1.5rem;
    border-bottom: 1px solid var(--border);
  }

  .logo { display: flex; align-items: center; gap: 12px; }
  .logo-icon {
    width: 40px; height: 40px;
    background: var(--accent);
    border-radius: 10px;
    display: flex; align-items: center; justify-content: center;
    font-size: 18px;
  }
  .logo h1 { font-size: 1.4rem; font-weight: 800; letter-spacing: -0.5px; }
  .logo span { color: var(--accent); }

  .date-badge {
    font-family: 'DM Mono', monospace;
    font-size: 12px;
    color: var(--muted);
    background: var(--surface);
    border: 1px solid var(--border);
    padding: 6px 12px;
    border-radius: 6px;
  }

  /* Summary cards */
  .summary-grid {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 12px;
    margin-bottom: 2rem;
  }

  .summary-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 1.2rem;
    position: relative;
    overflow: hidden;
    transition: border-color 0.2s;
  }

  .summary-card:hover { border-color: var(--accent); }

  .summary-card::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 2px;
  }

  .summary-card.cash::before { background: var(--cash); }
  .summary-card.ralph::before { background: var(--ralph); }
  .summary-card.jazz::before { background: var(--jazz); }
  .summary-card.spay::before { background: var(--spay); }

  .card-label {
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 1px;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 8px;
  }

  .card-amount {
    font-family: 'DM Mono', monospace;
    font-size: 1.6rem;
    font-weight: 500;
    color: var(--text);
  }

  .card-sub {
    font-size: 11px;
    color: var(--muted);
    margin-top: 4px;
    font-family: 'DM Mono', monospace;
  }

  /* Main layout */
  .main-grid {
    display: grid;
    grid-template-columns: 340px 1fr;
    gap: 20px;
  }

  /* Form panel */
  .panel {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 1.5rem;
  }

  .panel-title {
    font-size: 13px;
    font-weight: 700;
    letter-spacing: 1px;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 1.2rem;
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .panel-title::before {
    content: '';
    width: 4px; height: 14px;
    background: var(--accent);
    border-radius: 2px;
  }

  .form-group { margin-bottom: 14px; }

  label {
    display: block;
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 0.5px;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 6px;
  }

  input, select {
    width: 100%;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 10px 12px;
    color: var(--text);
    font-family: 'DM Mono', monospace;
    font-size: 13px;
    outline: none;
    transition: border-color 0.2s;
  }

  input:focus, select:focus { border-color: var(--accent); }
  select option { background: var(--surface2); }

  .btn {
    width: 100%;
    padding: 11px;
    border: none;
    border-radius: 8px;
    font-family: 'Syne', sans-serif;
    font-weight: 700;
    font-size: 13px;
    letter-spacing: 0.5px;
    cursor: pointer;
    transition: all 0.2s;
    margin-bottom: 8px;
  }

  .btn-primary { background: var(--accent); color: white; }
  .btn-primary:hover { background: #6a58e5; transform: translateY(-1px); }

  .btn-secondary {
    background: transparent;
    border: 1px solid var(--border);
    color: var(--text);
  }
  .btn-secondary:hover { border-color: var(--accent); color: var(--accent); }

  .btn-danger {
    background: transparent;
    border: 1px solid var(--border);
    color: var(--muted);
    font-size: 12px;
  }
  .btn-danger:hover { border-color: var(--danger); color: var(--danger); }

  .btn-group { margin-top: 8px; }

  /* Table panel */
  .table-panel {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 16px;
    overflow: hidden;
  }

  .table-header {
    padding: 1.2rem 1.5rem;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: space-between;
  }

  .filter-tabs {
    display: flex;
    gap: 6px;
  }

  .tab {
    padding: 5px 12px;
    border-radius: 6px;
    font-size: 11px;
    font-weight: 600;
    cursor: pointer;
    background: transparent;
    border: 1px solid var(--border);
    color: var(--muted);
    transition: all 0.15s;
  }

  .tab.active, .tab:hover { background: var(--surface2); color: var(--text); border-color: var(--accent); }

  table { width: 100%; border-collapse: collapse; }

  th {
    padding: 10px 16px;
    text-align: left;
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 1px;
    text-transform: uppercase;
    color: var(--muted);
    background: var(--surface2);
    border-bottom: 1px solid var(--border);
  }

  td {
    padding: 12px 16px;
    font-family: 'DM Mono', monospace;
    font-size: 12px;
    border-bottom: 1px solid rgba(42,42,58,0.5);
    vertical-align: middle;
  }

  tr:last-child td { border-bottom: none; }
  tr:hover td { background: rgba(124,106,247,0.04); }

  .cat-badge {
    display: inline-block;
    padding: 3px 8px;
    border-radius: 4px;
    font-size: 10px;
    font-weight: 600;
    letter-spacing: 0.5px;
  }

  .cat-Cash { background: rgba(74,222,128,0.15); color: var(--cash); }
  .cat-Ralph_CC { background: rgba(124,106,247,0.15); color: var(--ralph); }
  .cat-Jazz_CC { background: rgba(244,114,182,0.15); color: var(--jazz); }
  .cat-Spaylater { background: rgba(251,191,36,0.15); color: var(--spay); }

  .status-badge {
    display: inline-block;
    padding: 3px 8px;
    border-radius: 4px;
    font-size: 10px;
    font-weight: 600;
  }

  .status-PAID { background: rgba(74,222,128,0.15); color: var(--cash); }
  .status-UNPAID { background: rgba(248,113,113,0.15); color: var(--danger); }

  .amount-neg { color: var(--danger); }
  .amount-pos { color: var(--cash); }

  .row-select { cursor: pointer; }
  .row-select.selected td { background: rgba(124,106,247,0.08); }

  .empty-state {
    text-align: center;
    padding: 3rem;
    color: var(--muted);
    font-size: 13px;
  }

  /* Dashboard modal */
  .modal-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.7);
    z-index: 100;
    align-items: center;
    justify-content: center;
    backdrop-filter: blur(4px);
  }

  .modal-overlay.active { display: flex; }

  .modal {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 2rem;
    width: 480px;
    max-width: 90vw;
  }

  .modal-title {
    font-size: 1.2rem;
    font-weight: 800;
    margin-bottom: 1.5rem;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }

  .modal-close {
    background: none;
    border: none;
    color: var(--muted);
    font-size: 20px;
    cursor: pointer;
  }

  .dash-item {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 1rem 1.2rem;
    margin-bottom: 10px;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }

  .dash-cat { font-weight: 700; font-size: 14px; }
  .dash-meta { font-family: 'DM Mono', monospace; font-size: 11px; color: var(--muted); margin-top: 3px; }
  .dash-amt { font-family: 'DM Mono', monospace; font-size: 1.1rem; font-weight: 500; color: var(--danger); }

  .dash-total {
    background: var(--accent);
    border-radius: 12px;
    padding: 1rem 1.2rem;
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-top: 12px;
  }

  .dash-total .label { font-weight: 700; font-size: 13px; }
  .dash-total .amount { font-family: 'DM Mono', monospace; font-size: 1.2rem; font-weight: 500; }

  .urgent-tag {
    background: rgba(248,113,113,0.2);
    color: var(--danger);
    border: 1px solid rgba(248,113,113,0.3);
    padding: 2px 8px;
    border-radius: 4px;
    font-size: 10px;
    font-weight: 600;
    margin-left: 8px;
  }

  /* Toast */
  .toast {
    position: fixed;
    bottom: 2rem;
    right: 2rem;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-left: 3px solid var(--accent2);
    border-radius: 10px;
    padding: 12px 16px;
    font-size: 13px;
    z-index: 200;
    transform: translateY(100px);
    opacity: 0;
    transition: all 0.3s;
  }

  .toast.show { transform: translateY(0); opacity: 1; }
</style>
</head>
<body>

<div class="container">
  <header>
    <div class="logo">
      <div class="logo-icon">₱</div>
      <h1>Budget <span>Tracker</span></h1>
    </div>
    <div class="date-badge" id="today-badge"></div>
  </header>

  <div class="summary-grid">
    <div class="summary-card cash">
      <div class="card-label">Cash Flow</div>
      <div class="card-amount" id="sum-cash">₱0</div>
      <div class="card-sub">current balance</div>
    </div>
    <div class="summary-card ralph">
      <div class="card-label">Ralph CC</div>
      <div class="card-amount" id="sum-ralph">₱0</div>
      <div class="card-sub" id="due-ralph">cycle total</div>
    </div>
    <div class="summary-card jazz">
      <div class="card-label">Jazz CC</div>
      <div class="card-amount" id="sum-jazz">₱0</div>
      <div class="card-sub" id="due-jazz">cycle total</div>
    </div>
    <div class="summary-card spay">
      <div class="card-label">Spaylater</div>
      <div class="card-amount" id="sum-spay">₱0</div>
      <div class="card-sub" id="due-spay">cycle total</div>
    </div>
  </div>

  <div class="main-grid">
    <div class="panel">
      <div class="panel-title">Add Expense</div>

      <div class="form-group">
        <label>Date (MMDDYY)</label>
        <input type="text" id="inp-date" placeholder="e.g. 050126" maxlength="6">
      </div>

      <div class="form-group">
        <label>Category</label>
        <select id="inp-cat">
          <option value="">Select category</option>
          <option value="Cash">Cash</option>
          <option value="Ralph_CC">Ralph CC</option>
          <option value="Jazz_CC">Jazz CC</option>
          <option value="Spaylater">Spaylater</option>
        </select>
      </div>

      <div class="form-group">
        <label>Description</label>
        <input type="text" id="inp-desc" placeholder="e.g. Groceries">
      </div>

      <div class="form-group">
        <label>Amount (₱)</label>
        <input type="number" id="inp-amount" placeholder="0.00" step="0.01">
      </div>

      <button class="btn btn-primary" onclick="addExpense()">+ Add Expense</button>

      <div class="btn-group">
        <button class="btn btn-secondary" onclick="markPaid()">✓ Mark Selected as Paid</button>
        <button class="btn btn-secondary" onclick="showDashboard()">◎ Dashboard</button>
        <button class="btn btn-danger" onclick="clearAll()">✕ Clear All Data</button>
      </div>
    </div>

    <div class="table-panel">
      <div class="table-header">
        <div class="panel-title" style="margin:0">Transactions</div>
        <div class="filter-tabs">
          <div class="tab active" onclick="filterTable('all', this)">All</div>
          <div class="tab" onclick="filterTable('Cash', this)">Cash</div>
          <div class="tab" onclick="filterTable('Ralph_CC', this)">Ralph</div>
          <div class="tab" onclick="filterTable('Jazz_CC', this)">Jazz</div>
          <div class="tab" onclick="filterTable('Spaylater', this)">Spay</div>
          <div class="tab" onclick="filterTable('UNPAID', this)">Unpaid</div>
        </div>
      </div>
      <div style="overflow-x:auto">
        <table>
          <thead>
            <tr>
              <th>Date</th>
              <th>Category</th>
              <th>Description</th>
              <th>Amount</th>
              <th>Due</th>
              <th>Status</th>
            </tr>
          </thead>
          <tbody id="table-body"></tbody>
        </table>
        <div class="empty-state" id="empty-state">No transactions yet. Add your first expense.</div>
      </div>
    </div>
  </div>
</div>

<!-- Dashboard Modal -->
<div class="modal-overlay" id="modal">
  <div class="modal">
    <div class="modal-title">
      Dashboard
      <button class="modal-close" onclick="closeModal()">✕</button>
    </div>
    <div id="modal-content"></div>
  </div>
</div>

<!-- Toast -->
<div class="toast" id="toast"></div>

<script>
let data = [];
let selectedIndex = -1;
let currentFilter = 'all';

function formatDisplay(s) {
  if (!s) return '';
  const mm = parseInt(s.slice(0,2)) - 1;
  const dd = parseInt(s.slice(2,4));
  const yy = parseInt(s.slice(4,6)) + 2000;
  const d = new Date(yy, mm, dd);
  return d.toLocaleDateString('en-PH', {month:'short', day:'numeric', year:'2-digit'});
}

function toast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2500);
}

async function loadData() {
  const res = await fetch('/api/expenses');
  data = await res.json();
  render();
}

async function addExpense() {
  const dateStr = document.getElementById('inp-date').value.trim();
  const cat = document.getElementById('inp-cat').value;
  const desc = document.getElementById('inp-desc').value.trim();
  const amt = parseFloat(document.getElementById('inp-amount').value);

  if (!dateStr || dateStr.length !== 6) return toast('Enter date as MMDDYY');
  if (!cat) return toast('Select a category');
  if (!desc) return toast('Enter a description');
  if (isNaN(amt) || amt <= 0) return toast('Enter a valid amount');

  const res = await fetch('/api/expenses', {
    method: 'POST',
    headers: {'Content-Type': 'application/json'},
    body: JSON.stringify({date: dateStr, category: cat, desc, amount: amt})
  });

  if (res.ok) {
    document.getElementById('inp-date').value = '';
    document.getElementById('inp-desc').value = '';
    document.getElementById('inp-amount').value = '';
    await loadData();
    toast('Expense added');
  } else {
    const err = await res.json();
    toast('Error: ' + (err.error || 'Unknown error'));
  }
}

async function markPaid() {
  if (selectedIndex < 0) return toast('Select a row first');
  const filtered = getFiltered();
  if (selectedIndex >= filtered.length) return;
  const entry = filtered[selectedIndex];
  const idx = data.indexOf(entry);
  if (idx < 0) return;

  await fetch(`/api/expenses/${idx}/pay`, {method: 'POST'});
  selectedIndex = -1;
  await loadData();
  toast('Marked as paid');
}

async function clearAll() {
  if (!confirm('Clear all data? This cannot be undone.')) return;
  await fetch('/api/expenses/clear', {method: 'POST'});
  await loadData();
  toast('All data cleared');
}

async function showDashboard() {
  const res = await fetch('/api/dashboard');
  const json = await res.json();

  const html = json.results.map((r, i) => `
    <div class="dash-item">
      <div>
        <div class="dash-cat">${r.category.replace('_',' ')}
          ${i === 0 ? '<span class="urgent-tag">MOST URGENT</span>' : ''}
        </div>
        <div class="dash-meta">Due: ${formatDisplay(r.due)} · ${r.days} days left</div>
      </div>
      <div class="dash-amt">₱${r.total.toLocaleString('en-PH', {minimumFractionDigits:2})}</div>
    </div>
  `).join('') + `
    <div class="dash-total">
      <div class="label">Total Outstanding</div>
      <div class="amount">₱${json.overall.toLocaleString('en-PH', {minimumFractionDigits:2})}</div>
    </div>`;

  document.getElementById('modal-content').innerHTML = html;
  document.getElementById('modal').classList.add('active');
}

function getFiltered() {
  if (currentFilter === 'all') return data;
  if (currentFilter === 'UNPAID') return data.filter(r => r.status === 'UNPAID');
  return data.filter(r => r.category === currentFilter);
}

function filterTable(f, el) {
  currentFilter = f;
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  el.classList.add('active');
  selectedIndex = -1;
  render();
}

function render() {
  const tbody = document.getElementById('table-body');
  const empty = document.getElementById('empty-state');
  const filtered = getFiltered();

  if (filtered.length === 0) {
    tbody.innerHTML = '';
    empty.style.display = 'block';
  } else {
    empty.style.display = 'none';
    tbody.innerHTML = filtered.map((r, i) => `
      <tr class="row-select ${i === selectedIndex ? 'selected' : ''}" onclick="selectRow(${i})">
        <td>${formatDisplay(r.date)}</td>
        <td><span class="cat-badge cat-${r.category}">${r.category.replace('_',' ')}</span></td>
        <td>${r.desc}</td>
        <td class="${r.amount < 0 ? 'amount-neg' : 'amount-pos'}">
          ${r.amount < 0 ? '-' : ''}₱${Math.abs(r.amount).toLocaleString('en-PH', {minimumFractionDigits:2})}
        </td>
        <td>${r.due ? formatDisplay(r.due) : '—'}</td>
        <td>${r.status ? `<span class="status-badge status-${r.status}">${r.status}</span>` : '—'}</td>
      </tr>
    `).join('');
  }

  updateSummary();
}

function selectRow(i) {
  selectedIndex = selectedIndex === i ? -1 : i;
  render();
}

function updateSummary() {
  const cashBal = data.filter(r => r.category === 'Cash').reduce((s, r) => s + r.amount, 0);
  document.getElementById('sum-cash').textContent = `₱${Math.abs(cashBal).toLocaleString('en-PH', {minimumFractionDigits:0})}`;

  fetch('/api/dashboard').then(r => r.json()).then(json => {
    json.results.forEach(r => {
      const key = r.category === 'Ralph_CC' ? 'ralph' : r.category === 'Jazz_CC' ? 'jazz' : 'spay';
      document.getElementById(`sum-${key}`).textContent = `₱${r.total.toLocaleString('en-PH', {minimumFractionDigits:0})}`;
      document.getElementById(`due-${key}`).textContent = `due ${formatDisplay(r.due)} (${r.days}d)`;
    });
  });
}

function closeModal() {
  document.getElementById('modal').classList.remove('active');
}

document.getElementById('modal').addEventListener('click', function(e) {
  if (e.target === this) closeModal();
});

const now = new Date();
document.getElementById('today-badge').textContent = now.toLocaleDateString('en-PH', {weekday:'short', month:'short', day:'numeric', year:'numeric'});

loadData();
</script>
</body>
</html>
